services:

  backend:
    build:
      context: .
      dockerfile: backend/management_server/Dockerfile
    container_name: management-server
    ports:
      - "8081:8080"
    environment:
      # ✅ FIXED: Use service name 'db' and internal port 5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/dealer_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # ✅ FIXED: Use internal port 8080
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # Give app time to start
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: management-client
    ports:
      - "5173:80"
    environment:
      # ✅ FIXED: Use localhost for browser-side requests
      - VITE_API_URL=http://localhost:8081
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    container_name: dealer-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dealer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
